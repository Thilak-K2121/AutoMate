name: flutter_app
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # The following adds the libraries for API and Storage
  http: ^1.1.0
  shared_preferences: ^2.2.2
  socket_io_client: ^2.0.3

  # The following adds the Cupertino Icons font to your application.
  cupertino_icons: ^1.0.8
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

# This is the section where Flutter-specific configurations live
flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/google.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/auto_icon(1) (1).png"
  adaptive_icon_background: "#ffffff" # Keeps the background a clean white
  adaptive_icon_foreground: "assets/images/auto_icon(1) (1).png"

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/auto_icon(1).png"
  android_12:
    image: "assets/images/auto_icon(1).png"